
name: OpenSTA Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout OpenSTA
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          # Note: flex and bison are pulled from msys repo, others from mingw64
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-tcl
            mingw-w64-x86_64-swig
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-eigen3
            flex
            bison

      - name: Build OpenSTA
        shell: msys2 {0}
        run: |
          mkdir build
          cd build
          # Configure using MinGW Makefiles
          cmake .. -G "MinGW Makefiles" \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DTCL_LIBRARY=/mingw64/lib/libtcl86.dll.a \
                   -DTCL_INCLUDE_PATH=/mingw64/include
          
          # Compile using all available CPU cores
          make -j$(nproc)

      - name: Collect Artifacts and DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist
          # Copy the compiled binary
          cp build/app/sta.exe dist/
          
          # Copy runtime dependencies (DLLs) for portability
          cp /mingw64/bin/libtcl86.dll dist/
          cp /mingw64/bin/zlib1.dll dist/
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: OpenSTA-Windows-x64
          path: dist/
