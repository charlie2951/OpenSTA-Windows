name: OpenSTA Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Official OpenSTA Source
        uses: actions/checkout@v4
        with:
          repository: The-OpenROAD-Project/OpenSTA
          ref: main             # Ensures we get the latest stable code
          submodules: recursive
          path: .               # Force it to the root of the workspace

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-tcl
            mingw-w64-x86_64-swig
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-eigen3
            flex
            bison

      - name: Verify Files
        shell: msys2 {0}
        run: |
          echo "Checking for CMakeLists.txt..."
          ls -la
          if [ ! -f "CMakeLists.txt" ]; then
            echo "Error: CMakeLists.txt still not found in root!"
            exit 1
          fi

      - name: Build OpenSTA
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          # We use -D options to ensure MinGW finds the MSYS2 Tcl, not Windows Tcl
          cmake .. -G "MinGW Makefiles" \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DTCL_LIBRARY=/mingw64/lib/libtcl86.dll.a \
                   -DTCL_INCLUDE_PATH=/mingw64/include
          
          make -j$(nproc)

      - name: Collect Artifacts
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/app/sta.exe dist/
          # Collect all necessary DLLs for a standalone Windows app
          cp /mingw64/bin/libtcl86.dll dist/
          cp /mingw64/bin/zlib1.dll dist/
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenSTA-Windows-x64
          path: dist/
