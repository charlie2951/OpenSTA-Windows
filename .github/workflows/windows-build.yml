name: OpenSTA CI/CD (Windows)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-tcl
            mingw-w64-x86_64-swig
            mingw-w64-x86_64-bison
            mingw-w64-x86_64-flex
            mingw-w64-x86_64-zlib

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run OpenSTA Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Prepare Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir staging
          cp build/app/sta.exe staging/
          # Copy necessary DLLs for standalone execution
          cp /mingw64/bin/libtcl*.dll staging/
          cp /mingw64/bin/zlib*.dll staging/
          cd staging && zip -r ../OpenSTA-Windows.zip .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: OpenSTA-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
